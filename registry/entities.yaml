# Corporate Number (法人番号 / JCN), the EDINET code when the entity is itself a
# disclosing filer, and the Japanese-name aliases that we expect to see in
# MajorShareholders tables and policy-shareholding rows.
#
# Sources:
#   - JCN: https://www.houjin-bangou.nta.go.jp/  (verified by user when adding)
#   - EDINET codes: EDINET document lists (https://disclosure2.edinet-fsa.go.jp/)
#
# This is a controlled file: the builder validates JCN length (13 digits) and
# uniqueness; only entities the maintainers have actually verified should appear.

