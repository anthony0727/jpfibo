id: case-006-mitsubishi-corp-policy-shareholding
title: Mitsubishi Corporation cross-shareholding within Mitsubishi group network
title_ja: 三菱商事による三菱グループ内の政策保有株式
domain: policy_shareholding
source:
  filer: Mitsubishi Corporation
  filer_edinet_code: E02497
  document: Annual securities report (有価証券報告書), FY2024
  cited_section: "「株式の保有状況」"
  edinet_url: https://disclosure2.edinet-fsa.go.jp/
  notes: |
    Sōgō shōsha discloses extensive policy shareholdings in group and
    business-partner companies. The disclosure makes both the purpose and
    the qualitative business-alliance description explicit.
raw_claim: |
  Mitsubishi Corporation reports policy shareholdings in multiple group and
  partner companies for purposes of long-term business cooperation; each
  entry includes purpose, carrying amount, and number of shares.
